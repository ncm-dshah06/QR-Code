<style>
  :root{ --bb-blue:#0046BE; --bb-navy:#0039A6; --bb-yellow:#F4C400; --bb-yellow-d:#d9a900; }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{

    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:40px 20px;
  }
  .scene{width:340px;height:360px;perspective:1150px;display:flex;align-items:center;justify-content:center;}
  .box{width:180px;height:180px;position:relative;transform-style:preserve-3d;animation:spin 11s cubic-bezier(.6,.02,.2,1) infinite;}
  @keyframes spin{
    0%{transform:rotateY(0) rotateX(-16deg);}
    28%{transform:rotateY(0) rotateX(-16deg);}
    50%{transform:rotateY(180deg) rotateX(-16deg);}
    72%{transform:rotateY(360deg) rotateX(-16deg);}
    100%{transform:rotateY(360deg) rotateX(-16deg);}
  }
  .face{position:absolute;width:180px;height:180px;transform-style:preserve-3d;}
  .front{transform:translateZ(90px);background:var(--bb-blue);}
  .back{transform:rotateY(180deg) translateZ(90px);background:var(--bb-navy);}
  .right{transform:rotateY(90deg) translateZ(90px);background:#003182;}
  .left{transform:rotateY(-90deg) translateZ(90px);background:#003c99;}
  .top{transform:rotateX(90deg) translateZ(90px);background:#155bd4;}
  .bottom{transform:rotateX(-90deg) translateZ(90px);background:#002a63;}
  .rv{position:absolute;top:0;left:50%;margin-left:-13px;width:26px;height:100%;background:var(--bb-yellow);}
  .rh{position:absolute;left:0;top:50%;margin-top:-13px;height:26px;width:100%;background:var(--bb-yellow);}
  /* code sits on a clean tag over the ribbon cross so it stays scannable */
  .codetag{position:absolute;top:20px;left:20px;right:20px;bottom:20px;background:#fff;
           border:1px solid #e3e3e0;border-radius:10px;box-shadow:0 4px 14px rgba(0,0,0,.14);}
  /* blue pom bow topper */
  .bow{position:absolute;left:50%;top:50%;width:0;height:0;transform-style:preserve-3d;transform:translateZ(-10px) rotateX(-90deg);}
  .bow.x{transform:translateZ(-10px) rotateX(-90deg) rotateY(90deg);}
  /* looped ribbon pom topper (SVG) */
  .pom{position:absolute;left:0;top:0;width:180px;height:166px;transform:translate(-50%,-54%);}
  /* Best Buy logo tag centered on the code */
  .logo{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--bb-yellow);color:var(--bb-blue);font-weight:700;font-size:8.5px;line-height:1;text-align:center;padding:5px 8px;border-radius:3px;letter-spacing:.3px;white-space:nowrap;box-shadow:0 0 0 3px #fff,0 1px 3px rgba(0,0,0,.28);z-index:4;}
  /* forward-facing bow that sits in front of the code (code peeks out behind it) */
  .fbow{position:absolute;left:50%;top:50%;width:0;height:0;transform:translateZ(14px);transform-style:preserve-3d;z-index:6;}
  .fp{position:absolute;left:0;top:0;width:14px;height:24px;background:var(--bb-yellow);border-radius:50% 50% 46% 46%;transform-origin:50% 100%;}
  .fp.d{background:var(--bb-yellow-d);}
  .fp.in{width:10px;height:17px;background:#ffd94a;}
  .fknot{position:absolute;left:0;top:0;width:16px;height:16px;margin:-8px 0 0 -8px;background:#c99109;border-radius:50%;z-index:2;box-shadow:inset -2px -2px 4px rgba(0,0,0,.3);}
  .cap{display:flex;gap:8px;align-items:center;font-size:13px;color:#666;}
  .dot{width:8px;height:8px;border-radius:50%;background:#bbb;animation:pulse 11s ease-in-out infinite;}
  @keyframes pulse{0%,28%{background:#207951;box-shadow:0 0 10px rgba(32,121,81,.5);transform:scale(1.4)}40%,100%{background:#bbb;box-shadow:none;transform:scale(1)}}
  @media (prefers-reduced-motion: reduce){ .box{animation:none;transform:rotateY(0) rotateX(-16deg);} .dot{animation:none;background:#207951;} }
